[tool.ruff]
target-version = "py311"
line-length = 88
src = ["app", "dags", "scripts", "tests"]

[tool.ruff.lint]
# Ruff's default rule set (pyflakes + a curated subset of pycodestyle)
# plus import sorting.
select = ["E4", "E7", "E9", "F", "I"]

[tool.ruff.lint.per-file-ignores]
# Imports intentionally follow runtime setup (sys.path bootstrap /
# pytest.importorskip), so module-level-import-not-at-top is expected here.
"scripts/evaluate_agent_questions.py" = ["E402"]
"tests/test_dag_import.py" = ["E402"]

[tool.mypy]
python_version = "3.11"
files = ["app"]
ignore_missing_imports = true
