version: 2

models:
  - name: stg_game_logs_clean
    columns:
      - name: game_id
        tests: [not_null]
      - name: player_id
        tests: [not_null]
      - name: game_date
        tests: [not_null]
      - name: matchup
        tests: [not_null]
      - name: season
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['2025-26']
      - name: season_type
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Regular Season', 'Playoffs']
      - name: wl
        tests:
          - accepted_values:
              arguments:
                values: ['W', 'L']
  - name: int_player_game_enriched
    columns:
      - name: game_id
        tests: [not_null]
      - name: season
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['2025-26']
      - name: season_type
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Regular Season', 'Playoffs']
      - name: team_abbr
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: &nba_team_abbrs ['ATL', 'BOS', 'BKN', 'CHA', 'CHI', 'CLE', 'DAL', 'DEN', 'DET', 'GSW', 'HOU', 'IND', 'LAC', 'LAL', 'MEM', 'MIA', 'MIL', 'MIN', 'NOP', 'NYK', 'OKC', 'ORL', 'PHI', 'PHX', 'POR', 'SAC', 'SAS', 'TOR', 'UTA', 'WAS']
      - name: opponent_abbr
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: *nba_team_abbrs
      - name: home_away
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['HOME', 'AWAY']
  - name: stg_schedule_clean
    columns:
      - name: schedule_date
        tests: [not_null]
      - name: team_abbr
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: *nba_team_abbrs
      - name: opponent_abbr
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: *nba_team_abbrs
      - name: game_status
        tests:
          - accepted_values:
              arguments:
                values: ['scheduled', 'final', 'postponed']
  - name: stg_game_line_scores_clean
    columns:
      - name: game_id
        tests: [not_null]
      - name: team_id
        tests: [not_null]
      - name: team_abbr
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: *nba_team_abbrs
      - name: pts
        tests: [not_null]
  - name: stg_player_shot_locations_clean
    columns:
      - name: player_id
        tests: [not_null]
      - name: team_id
        tests: [not_null]
      - name: season
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['2025-26']
      - name: season_type
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Regular Season', 'Playoffs']
  - name: stg_player_reference_clean
    columns:
      - name: player_id
        tests: [not_null, unique]
      - name: player_name
        tests: [not_null]
  - name: stg_player_injury_reports_clean
    columns:
      - name: report_date
        tests: [not_null]
      - name: report_timestamp_utc
        tests: [not_null]
      - name: game_date
        tests: [not_null]
      - name: team_abbr
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: *nba_team_abbrs
      - name: injury_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Available', 'Probable', 'Questionable', 'Doubtful', 'Out']
