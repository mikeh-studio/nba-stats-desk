version: 2

sources:
  - name: bronze
    database: "{{ env_var('BQ_PROJECT', env_var('GCP_PROJECT_ID', 'local-project')) if target.type == 'bigquery' else env_var('REDSHIFT_DB', 'nba_analytics') }}"
    schema: "{{ env_var('BQ_DATASET_BRONZE', env_var('BQ_DATASET', 'nba_bronze')) if target.type == 'bigquery' else env_var('REDSHIFT_SCHEMA_BRONZE', 'nba_bronze') }}"
    loader: airflow
    config:
      loaded_at_field: ingested_at_utc
      freshness:
        warn_after: {count: 36, period: hour}
        error_after: {count: 72, period: hour}
    tables:
      - name: raw_game_logs
        columns:
          - name: game_id
            tests: [not_null]
          - name: player_id
            tests: [not_null]
          - name: game_date
            tests: [not_null]
          - name: matchup
            tests: [not_null]
          - name: season
            tests:
              - not_null
              - accepted_values:
                  arguments:
                    values: ['2025-26']
          - name: season_type
            tests:
              - not_null
              - accepted_values:
                  arguments:
                    values: ['Regular Season', 'Playoffs']
          - name: wl
            tests:
              - accepted_values:
                  arguments:
                    values: ['W', 'L']
      - name: raw_schedule
        columns:
          - name: schedule_date
            tests: [not_null]
          - name: team_abbr
            tests:
              - not_null
              - accepted_values:
                  arguments:
                    values: &nba_team_abbrs ['ATL', 'BOS', 'BKN', 'CHA', 'CHI', 'CLE', 'DAL', 'DEN', 'DET', 'GSW', 'HOU', 'IND', 'LAC', 'LAL', 'MEM', 'MIA', 'MIL', 'MIN', 'NOP', 'NYK', 'OKC', 'ORL', 'PHI', 'PHX', 'POR', 'SAC', 'SAS', 'TOR', 'UTA', 'WAS']
          - name: opponent_abbr
            tests:
              - not_null
              - accepted_values:
                  arguments:
                    values: *nba_team_abbrs
      - name: raw_game_line_scores
        columns:
          - name: game_id
            tests: [not_null]
          - name: team_id
            tests: [not_null]
          - name: team_abbr
            tests:
              - not_null
              - accepted_values:
                  arguments:
                    values: *nba_team_abbrs
          - name: season
            tests:
              - not_null
              - accepted_values:
                  arguments:
                    values: ['2025-26']
      - name: raw_player_shot_locations
        columns:
          - name: player_id
            tests: [not_null]
          - name: team_id
            tests: [not_null]
          - name: season
            tests:
              - not_null
              - accepted_values:
                  arguments:
                    values: ['2025-26']
          - name: season_type
            tests:
              - not_null
              - accepted_values:
                  arguments:
                    values: ['Regular Season', 'Playoffs']
      - name: raw_player_reference
        columns:
          - name: player_id
            tests: [not_null, unique]
          - name: player_name
            tests: [not_null]
      - name: raw_player_injury_reports
        columns:
          - name: report_date
          - name: report_timestamp_utc
          - name: game_date
          - name: matchup
          - name: team_abbr
          - name: player_id
          - name: player_name
          - name: injury_status
          - name: ingested_at_utc
