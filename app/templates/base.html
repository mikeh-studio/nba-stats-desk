<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ page_title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=Inter+Tight:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f1113;
        --surface: #171a1e;
        --surface-2: #1e2329;
        --surface-3: #252c33;
        --ink: #f3f1ec;
        --muted: #a7afb7;
        --accent: #f04e23;
        --accent-hot: #ff6a3d;
        --line: #2b3138;
        --highlight: #e7e0d4;
        --success: #5dd39e;
        --danger: #ff6b6b;
      }
      * { box-sizing: border-box; }
      [hidden] {
        display: none !important;
      }
      body {
        margin: 0;
        font-family: "Inter Tight", system-ui, sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top right, rgba(240, 78, 35, 0.14), transparent 24rem),
          linear-gradient(180deg, #0d0f12 0%, #12161b 35%, #0f1113 100%);
      }
      a {
        color: inherit;
        text-decoration-thickness: 0.08em;
        text-underline-offset: 0.16em;
      }
      button,
      input,
      select {
        font: inherit;
      }
      main {
        max-width: 1340px;
        margin: 0 auto;
        padding: 1.5rem 1rem 3rem;
      }
      .site-shell {
        display: grid;
        gap: 1.5rem;
      }
      .nav {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 1rem;
        align-items: center;
        padding: 1rem 1.125rem;
        background: rgba(23, 26, 30, 0.96);
        border: 1px solid var(--line);
        border-radius: 20px;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.22);
      }
      .brand-lockup {
        display: grid;
        gap: 0.15rem;
      }
      .brand-kicker {
        color: var(--accent);
        font-size: 0.72rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }
      .brand-title {
        font-family: "Bebas Neue", Impact, sans-serif;
        font-size: 1.7rem;
        line-height: 1;
        letter-spacing: 0.03em;
      }
      .nav-links {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
        align-items: center;
        color: var(--muted);
        font-size: 0.92rem;
      }
      .nav-links a:hover,
      .nav-links a:focus-visible {
        color: var(--highlight);
      }
      .season-tag,
      .mono {
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.78rem;
      }
      .search-form {
        display: flex;
        gap: 0.5rem;
        align-items: center;
      }
      .search-form input,
      .select,
      .input {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 0.65rem 0.9rem;
        min-width: 12rem;
        color: var(--ink);
        background: rgba(30, 35, 41, 0.92);
      }
      .player-search-form {
        position: relative;
        display: flex;
        gap: 0.6rem;
        align-items: flex-start;
        max-width: 42rem;
      }
      .player-search-shell {
        position: relative;
        flex: 1 1 22rem;
        min-width: 16rem;
      }
      .player-search-shell .input {
        width: 100%;
      }
      .nav-player-search {
        margin-left: auto;
        max-width: 28rem;
      }
      .player-search-results {
        position: absolute;
        z-index: 20;
        top: calc(100% + 0.4rem);
        left: 0;
        right: 0;
        display: grid;
        gap: 0.35rem;
        max-height: 24rem;
        overflow: auto;
        padding: 0.45rem;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(15, 17, 19, 0.98);
        box-shadow: 0 18px 44px rgba(0, 0, 0, 0.3);
      }
      .player-search-result {
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 0.75rem;
        align-items: center;
        width: 100%;
        padding: 0.65rem;
        color: var(--ink);
        text-align: left;
        border: 1px solid transparent;
        border-radius: 12px;
        background: transparent;
        cursor: pointer;
      }
      .player-search-result:hover,
      .player-search-result:focus-visible {
        border-color: rgba(240, 78, 35, 0.45);
        background: rgba(240, 78, 35, 0.1);
      }
      .button-link,
      .button,
      .track-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.35rem;
        border: 1px solid transparent;
        border-radius: 999px;
        padding: 0.72rem 1rem;
        background: var(--accent);
        color: #fff;
        text-decoration: none;
        cursor: pointer;
        transition: background-color 160ms ease, border-color 160ms ease, color 160ms ease, transform 160ms ease;
      }
      .button-link:hover,
      .button:hover,
      .track-button:hover,
      .button-link:focus-visible,
      .button:focus-visible,
      .track-button:focus-visible {
        background: var(--accent-hot);
        transform: translateY(-1px);
      }
      .button.secondary,
      .button-link.secondary,
      .track-button.secondary {
        background: transparent;
        color: var(--ink);
        border-color: var(--line);
      }
      .button.secondary:hover,
      .button-link.secondary:hover,
      .track-button.secondary:hover,
      .button.secondary:focus-visible,
      .button-link.secondary:focus-visible,
      .track-button.secondary:focus-visible {
        background: rgba(255, 255, 255, 0.05);
      }
      .button[disabled],
      .track-button[disabled] {
        opacity: 0.45;
        cursor: not-allowed;
        transform: none;
      }
      .hero {
        display: grid;
        gap: 1rem;
        padding: 1.5rem;
        background:
          linear-gradient(160deg, rgba(240, 78, 35, 0.16), transparent 38%),
          linear-gradient(180deg, rgba(37, 44, 51, 0.8), rgba(23, 26, 30, 0.96));
        border: 1px solid var(--line);
        border-radius: 28px;
        box-shadow: 0 24px 48px rgba(0, 0, 0, 0.22);
      }
      .eyebrow {
        color: var(--accent);
        font-size: 0.74rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }
      h1 {
        margin: 0;
        font-family: "Bebas Neue", Impact, sans-serif;
        font-size: clamp(2.4rem, 6vw, 4.2rem);
        line-height: 0.92;
        letter-spacing: 0.03em;
      }
      h2 {
        margin: 0 0 0.8rem;
        font-family: "Bebas Neue", Impact, sans-serif;
        font-size: clamp(1.7rem, 4vw, 2.4rem);
        letter-spacing: 0.04em;
      }
      h3 {
        margin: 0 0 0.35rem;
        font-size: 1.1rem;
      }
      p {
        margin: 0;
      }
      .subhead {
        max-width: 56rem;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.6;
      }
      .hero-top {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
        justify-content: space-between;
        align-items: flex-start;
      }
      .hero-actions {
        display: flex;
        gap: 0.6rem;
        flex-wrap: wrap;
      }
      .hero-signal-row {
        display: flex;
        align-items: center;
        gap: 1.15rem;
        flex-wrap: wrap;
        margin-top: 0.6rem;
      }
      .hero-rank {
        color: var(--accent);
        font-family: "Bebas Neue", Impact, sans-serif;
        font-size: clamp(3rem, 7vw, 5.5rem);
        line-height: 0.9;
        letter-spacing: 0.02em;
        flex-shrink: 0;
      }
      .hero-signal-copy {
        display: grid;
        gap: 0.25rem;
        min-width: 0;
      }
      .hero-signal-copy h1 {
        line-height: 0.96;
      }
      .hero-signal-copy h1 a {
        color: inherit;
        text-decoration: none;
      }
      .hero-signal-copy h1 a:hover,
      .hero-signal-copy h1 a:focus-visible {
        color: var(--accent-hot);
      }
      .status,
      .chip {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        padding: 0.4rem 0.72rem;
        border: 1px solid rgba(231, 224, 212, 0.14);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--highlight);
      }
      .chip.improvement {
        border-color: rgba(240, 78, 35, 0.42);
        background: rgba(240, 78, 35, 0.16);
        color: #fff3ec;
      }
      .status,
      .metric-value,
      th,
      td,
      .chip,
      .meta,
      .mono {
        font-family: "IBM Plex Mono", monospace;
      }
      .chip-row {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }
      .workspace {
        display: grid;
        grid-template-columns: minmax(0, 2.1fr) minmax(300px, 0.95fr);
        gap: 1rem;
        align-items: start;
      }
      .main-stack,
      .rail-stack,
      .stack {
        display: grid;
        gap: 1rem;
      }
      .card {
        display: grid;
        gap: 0.9rem;
        padding: 1.15rem;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 20px;
      }
      .card-header {
        display: flex;
        gap: 0.75rem;
        align-items: center;
        justify-content: space-between;
      }
      .card-header-actions {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }
      .notice,
      .empty-state {
        display: grid;
        gap: 0.35rem;
        padding: 0.95rem 1rem;
        border-radius: 16px;
      }
      .notice {
        border: 1px solid rgba(240, 78, 35, 0.35);
        background: rgba(240, 78, 35, 0.1);
      }
      .empty-state {
        border: 1px dashed var(--line);
        background: rgba(255, 255, 255, 0.02);
      }
      .meta {
        color: var(--muted);
        font-size: 0.78rem;
      }
      .signal-board {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
        gap: 0.9rem;
      }
      .signal {
        display: grid;
        gap: 0.65rem;
        padding: 1rem;
        border: 1px solid var(--line);
        border-radius: 18px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.035), transparent 100%),
          rgba(30, 35, 41, 0.66);
      }
      .signal-top {
        display: flex;
        gap: 0.75rem;
        justify-content: space-between;
      }
      .identity-row {
        display: flex;
        gap: 0.85rem;
        align-items: center;
      }
      .player-avatar {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 3.2rem;
        height: 3.2rem;
        border: 1px solid rgba(231, 224, 212, 0.14);
        border-radius: 50%;
        overflow: hidden;
        background:
          radial-gradient(circle at top, rgba(240, 78, 35, 0.25), transparent 60%),
          rgba(255, 255, 255, 0.05);
        color: var(--highlight);
        flex-shrink: 0;
      }
      .player-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .player-avatar-fallback {
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.9rem;
        letter-spacing: 0.08em;
      }
      .player-avatar.large {
        width: 4.6rem;
        height: 4.6rem;
      }
      .signal-rank {
        color: var(--accent);
        font-family: "Bebas Neue", Impact, sans-serif;
        font-size: 2rem;
        line-height: 1;
      }
      .data-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.85rem;
      }
      .table-scroll {
        width: 100%;
        overflow-x: auto;
      }
      .data-table.compact th,
      .data-table.compact td {
        padding: 0.55rem 0.4rem 0.55rem 0;
      }
      .game-log-table {
        min-width: 860px;
      }
      .data-table th,
      .data-table td {
        padding: 0.7rem 0;
        text-align: left;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        vertical-align: top;
      }
      .data-table th {
        color: var(--muted);
        font-size: 0.72rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .data-table tr.is-focus th,
      .data-table tr.is-focus td {
        color: var(--highlight);
        background: rgba(240, 78, 35, 0.08);
      }
      .metric-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
        gap: 0.75rem;
      }
      .metric {
        display: grid;
        gap: 0.4rem;
        padding: 0.85rem;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.03);
      }
      .metric-label {
        color: var(--muted);
        font-size: 0.73rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .metric-value {
        font-size: 1rem;
        color: var(--highlight);
      }
      .good {
        color: var(--success);
      }
      .bad {
        color: var(--danger);
      }
      .tab-list,
      .stat-toggle-group {
        display: flex;
        gap: 0.45rem;
        flex-wrap: wrap;
      }
      .tab-button {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 0.5rem 0.72rem;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.03);
        cursor: pointer;
      }
      .tab-button:hover,
      .tab-button:focus-visible,
      .tab-button.is-active {
        color: var(--highlight);
        border-color: rgba(240, 78, 35, 0.5);
        background: rgba(240, 78, 35, 0.13);
      }
      .tab-panel {
        display: grid;
        gap: 0.9rem;
      }
      .tab-panel[hidden] {
        display: none;
      }
      .trend-chart {
        min-height: 230px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.035), transparent 100%),
          rgba(30, 35, 41, 0.52);
        overflow: hidden;
      }
      .trend-chart svg {
        display: block;
        width: 100%;
        height: auto;
      }
      .trend-axis,
      .trend-label {
        fill: var(--muted);
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.72rem;
      }
      .trend-line {
        fill: none;
        stroke: var(--accent-hot);
        stroke-width: 3;
      }
      .trend-area {
        fill: rgba(240, 78, 35, 0.14);
      }
      .trend-dot {
        fill: var(--highlight);
        stroke: var(--accent);
        stroke-width: 2;
      }
      .trend-baseline {
        stroke: var(--success);
        stroke-width: 2;
        stroke-dasharray: 7 6;
      }
      .trend-baseline-label,
      .trend-tooltip-text {
        fill: var(--ink);
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.72rem;
      }
      .trend-tooltip {
        opacity: 0;
        pointer-events: none;
        transition: opacity 120ms ease;
      }
      .trend-point:hover .trend-tooltip,
      .trend-point:focus .trend-tooltip {
        opacity: 1;
      }
      .trend-tooltip-box {
        fill: rgba(15, 17, 19, 0.96);
        stroke: rgba(231, 224, 212, 0.24);
        stroke-width: 1;
      }
      .percentile-list {
        display: grid;
        gap: 0.85rem;
      }
      .percentile-row {
        display: grid;
        gap: 0.35rem;
      }
      .percentile-row-top {
        display: flex;
        justify-content: space-between;
        gap: 0.75rem;
        align-items: baseline;
      }
      .percentile-bar {
        height: 0.62rem;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
      }
      .percentile-fill {
        display: block;
        height: 100%;
        min-width: 0.25rem;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--accent), var(--success));
      }
      details.explain {
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        padding-top: 0.75rem;
      }
      details.explain summary {
        cursor: pointer;
        color: var(--highlight);
        font-size: 0.86rem;
        list-style: none;
      }
      details.explain summary::-webkit-details-marker {
        display: none;
      }
      details.explain[open] summary {
        color: var(--accent-hot);
      }
      details.explain p {
        margin-top: 0.55rem;
        color: var(--muted);
        font-size: 0.9rem;
        line-height: 1.55;
      }
      .tracked-rail {
        display: grid;
        gap: 0.75rem;
      }
      .stack-list {
        display: grid;
        gap: 0.8rem;
      }
      .tracked-grid,
      .compare-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 0.9rem;
      }
      .tracked-card,
      .compare-panel {
        display: grid;
        gap: 0.7rem;
        padding: 1rem;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.03);
      }
      .compare-panel.limited {
        border-color: rgba(240, 78, 35, 0.45);
      }
      .compare-builder {
        display: grid;
        gap: 0.8rem;
      }
      .compare-form {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
        align-items: center;
      }
      .compare-form .input {
        flex: 1 1 18rem;
      }
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
      :focus-visible {
        outline: 2px solid var(--accent-hot);
        outline-offset: 2px;
      }
      @media (max-width: 980px) {
        .nav {
          grid-template-columns: 1fr;
        }
        .workspace {
          grid-template-columns: 1fr;
        }
      }
      @media (max-width: 720px) {
        main {
          padding: 1rem 0.8rem 2rem;
        }
        .hero,
        .card,
        .nav {
          border-radius: 18px;
        }
        .search-form,
        .compare-form,
        .player-search-form {
          width: 100%;
        }
        .search-form input,
        .compare-form .input,
        .select,
        .player-search-shell {
          flex: 1 1 auto;
          min-width: 0;
        }
        .player-search-form {
          flex-wrap: wrap;
        }
      }
    </style>
  </head>
  <body data-tracking-cap="{{ tracking_cap|default(8) }}">
    <main>
      <div class="site-shell">
        <nav class="nav" aria-label="Primary">
          <div class="brand-lockup">
            <span class="brand-kicker">NBA Research Workbench</span>
            <span class="brand-title">NBA Stats Desk</span>
          </div>
          <div class="nav-links">
            <a href="/">Dashboard</a>
            <a href="/ask">Ask</a>
            <a href="/visualize">Visualize</a>
            <a href="/performance">Performance</a>
            <a href="/compare">Compare</a>
            <span class="season-tag">Season {{ season }}</span>
            <form class="player-search-form nav-player-search" data-player-search-form role="search">
              <label class="sr-only">Find qualified player</label>
              <div class="player-search-shell">
                <input
                  class="input"
                  name="q"
                  type="search"
                  placeholder="Search players"
                  autocomplete="off"
                  data-player-search-input
                />
                <div class="player-search-results" data-player-search-results hidden></div>
              </div>
            </form>
          </div>
        </nav>
        {% block content %}{% endblock %}
      </div>
    </main>
    <script type="module" src="/static/workbench.js"></script>
  </body>
</html>
