    trend_stat: MIN
    detail_average_key:
    baseline_key:
    percentile_key:
    leaderboard_column: avg_min
    direction: higher
    tier: 3
  fantasy_points_simple:
    label: BSI
    description: Simple box-score index used by this project as a fantasy proxy.
    aliases: [fantasy, fantasy_proxy, box_score_index, bsi]
    game_log_key: fantasy_points_simple
    trend_stat: FANTASY_POINTS_SIMPLE
    detail_average_key:
    baseline_key:
    percentile_key:
    leaderboard_column: avg_fantasy_points_simple
    direction: higher
    tier: 4
  points_created:
    label: Attributed Points
    description: Derived offensive points estimate calculated as PTS + AST * 2.
    aliases: [points_created, points_attributed, attributed_points, points_plus_assists_times_two, points + assists * 2, pts_plus_ast_x2]
    formula: "pts + ast * 2"
    trend_stat: POINTS_CREATED
    detail_average_key:
    baseline_key:
    percentile_key:
    leaderboard_column:
    direction: higher
    tier: 4
  fg_pct:
    label: FG%
    description: Field-goal percentage per game, made field goals over attempts.
    aliases: [field goal percentage, fg percentage, shooting percentage, fg pct]
    game_log_key: fg_pct
    formula: "fg_pct * 100"
    trend_stat: FG_PCT
    detail_average_key:
    baseline_key:
    percentile_key:
    leaderboard_column:
    direction: higher
    unit: percent
    tier: 3
  fg3_pct:
    label: 3P%
    description: Three-point percentage per game, made threes over three-point attempts.
    aliases: [three point percentage, 3p percentage, three pt percentage, 3pt pct, 3p pct]
    formula: "fg3m / fg3a * 100"
    trend_stat: FG3_PCT
    detail_average_key:
    baseline_key:
    percentile_key:
    leaderboard_column:
    direction: higher
    unit: percent
    tier: 3
  ts_pct:
    label: TS%
    description: True shooting percentage = points / (2 * (FGA + 0.44 * FTA)).
    aliases: [true shooting, true shooting percentage, ts percentage, ts pct]
    formula: "pts / (2 * (fga + 0.44 * fta)) * 100"
    trend_stat: TS_PCT
    detail_average_key:
    baseline_key:
    percentile_key:
    leaderboard_column:
    direction: higher
    unit: percent
    tier: 3
  plus_minus:
    label: "+/-"
    description: Plus-minus point differential while the player is on the court.
    aliases: [plus minus, plusminus, plus/minus, impact, net points]
    game_log_key: plus_minus
    trend_stat: PLUS_MINUS
    detail_average_key:
    baseline_key:
    percentile_key:
    leaderboard_column:
    direction: higher
    tier: 3
